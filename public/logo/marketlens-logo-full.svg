<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="areaFill" x1="40" y1="12" x2="40" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- ICON -->
  <rect x="4" y="4" width="72" height="72" rx="14" stroke="#00FF88" stroke-width="1.6" fill="none" opacity="0.2"/>
  <!-- Area fill -->
  <polygon points="11,54 22,42 32,46 43,22 53,30 62,14 69,19 69,62 11,62" fill="url(#areaFill)"/>
  <!-- Chart line -->
  <polyline points="11,54 22,42 32,46 43,22 53,30 62,14 69,19" stroke="#00FF88" stroke-width="2.4" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Base line -->
  <line x1="11" y1="62" x2="69" y2="62" stroke="#00FF88" stroke-width="1.2" opacity="0.15"/>

  <!-- WORDMARK -->
  <text x="92" y="44" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.3" fill="#F0F0F5">market</text>
  <text x="211" y="44" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.3" fill="#00FF88">lens</text>

  <!-- LIVE dot -->
  <circle cx="96" cy="58" r="3" fill="#00FF88" opacity="0.6"/>
  <text x="104" y="62" font-family="'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif" font-size="8.5" font-weight="400" letter-spacing="1" fill="#C8C8D0" opacity="0.45">LIVE</text>
</svg>
