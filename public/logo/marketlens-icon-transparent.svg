<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="areaFill" x1="50" y1="15" x2="50" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Frame -->
  <rect x="5" y="5" width="90" height="90" rx="18" stroke="#00FF88" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Area fill -->
  <polygon points="14,68 28,52 40,58 54,28 66,38 78,18 86,24 86,78 14,78" fill="url(#areaFill)"/>

  <!-- Chart line -->
  <polyline points="14,68 28,52 40,58 54,28 66,38 78,18 86,24" stroke="#00FF88" stroke-width="3" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Base line -->
  <line x1="14" y1="78" x2="86" y2="78" stroke="#00FF88" stroke-width="1.5" opacity="0.15"/>
</svg>
