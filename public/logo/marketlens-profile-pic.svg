<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="areaFill" x1="100" y1="55" x2="100" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FF88" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="100" fill="#08080D"/>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="96" stroke="#00FF88" stroke-width="2" fill="none" opacity="0.25"/>

  <!-- Inner icon (scaled up and centered) -->
  <g transform="translate(25, 25) scale(1.5)">
    <!-- Frame -->
    <rect x="5" y="5" width="90" height="90" rx="18" stroke="#00FF88" stroke-width="1.5" fill="none" opacity="0.15"/>

    <!-- Area fill -->
    <polygon points="14,68 28,52 40,58 54,28 66,38 78,18 86,24 86,78 14,78" fill="url(#areaFill)"/>

    <!-- Chart line -->
    <polyline points="14,68 28,52 40,58 54,28 66,38 78,18 86,24" stroke="#00FF88" stroke-width="2.5" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

    <!-- Base line -->
    <line x1="14" y1="78" x2="86" y2="78" stroke="#00FF88" stroke-width="1.2" opacity="0.12"/>
  </g>
</svg>
